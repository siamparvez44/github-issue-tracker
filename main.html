<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/Aperture.png"
      type="image/x-icon" />
    <title>Dashboard - GitHub Issue Tracker</title>

    <!-- daisyui+tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet" />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

    <style>
      * {
        font-family: 'Inter', sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body class="min-h-svh bg-slate-50">
    <div class="navbar bg-base-100 px-6 shadow-sm">
      <div class="flex items-center flex-1 gap-1">
        <i class="fa-brands fa-github text-slate-800 text-5xl"></i>
        <h3 class="lg:block hidden text-xl font-bold">GitHub Issues Tracker</h3>
      </div>
      <div class="flex gap-2">
        <label class="input">
          <i class="fa-solid fa-magnifying-glass text-slate-500"></i>
          <input
            type="search"
            id="search-issue"
            class="grow"
            placeholder="Search issues..." />
        </label>
        <button type="button" class="btn btn-primary min-w-24 lg:min-w-32">
          <i class="fa-solid fa-plus"></i> New Issue
        </button>
      </div>
    </div>

    <div class="container px-5 py-12 mx-auto space-y-4">
      <div class="card bg-base-100 w-full shadow-sm">
        <div class="card-body space-y-4">
          <div class="card-actions">
            <button
              id="all-issues-btn"
              onclick="setActiveTab('all-issues-btn')"
              class="tab-btn btn btn-primary min-w-24 lg:min-w-32">
              All
            </button>
            <button
              id="open-issues-btn"
              onclick="setActiveTab('open-issues-btn')"
              class="tab-btn btn min-w-24 lg:min-w-32">
              Open
            </button>
            <button
              id="closed-issues-btn"
              onclick="setActiveTab('closed-issues-btn')"
              class="tab-btn btn min-w-24 lg:min-w-32">
              Closed
            </button>
          </div>
        </div>
      </div>
      
      <div class="card bg-neutral-50 w-full overflow-hidden shadow-sm">
        <div
          class="card-actions border-slate-200 flex flex-wrap items-center justify-between gap-5 p-6 bg-white border-b">
          <div class="flex gap-2">
            <div
              class="badge bg-primary/20 badge-lg aspect-square size-12 p-2 rounded-full">
              <img
                src="./assets/Aperture.png"
                alt="Aperture"
                class="w-full h-full" />
            </div>
            <div>
              <h3 class="text-xl font-bold">
                <span id="issue-count">0</span> Issues
              </h3>
              <p class="text-slate-500 text-sm">
                Track and manage your project issues
              </p>
            </div>
          </div>

          <div class="space-x-2 text-sm">
            <span><i class="fa-solid fa-circle text-success"></i> Open</span>
            <span
              ><i class="fa-solid fa-circle text-purple-500"></i> Closed</span
            >
          </div>
        </div>

        <div class="card-body space-y-4">
          <div id="issues-container" class="md:grid-cols-2 lg:grid-cols-4 grid items-stretch grid-cols-1 gap-6"></div>
          <div id="issues-spinner" class="items-center justify-center hidden py-32">
            <span class="loading loading-spinner text-primary"></span>
          </div>
        </div>
      </section>
    </div>


    <dialog id="singleModalTrigger" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="single-issue-container"></div>
      </div>
    </dialog>


    <!-- TODO: Priority ( High ) siamparvez 030920261249 need to take this out before final push -->
    <div
      class="bottom-1 right-1 size-6 bg-primary fixed z-50 flex items-center justify-center p-3 font-mono text-xs text-white rounded-full">
      <div class="md:hidden block">sm</div>
      <div class="md:block lg:hidden hidden">md</div>
      <div class="lg:block xl:hidden hidden">lg</div>
      <div class="xl:block 2xl:hidden hidden">xl</div>
      <div class="2xl:block hidden">2xl</div>
    </div>

    <script src="./scripts/main.js"></script>
  </body>
</html>
