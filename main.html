<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - GitHub Issue Tracker</title>

    <!-- daisyui+tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet" />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />

    <style>
      * {
        font-family: 'Inter', sans-serif;
        font-optical-sizing: auto;
      }
    </style>
  </head>
  <body class="min-h-svh min-w-svw bg-slate-50">
    <div class="navbar bg-base-100 shadow-sm px-6">
      <div class="flex-1 flex gap-1 items-center">
        <i class="fa-brands fa-github text-5xl text-slate-800"></i>
        <h3 class="text-xl font-bold hidden lg:block">GitHub Issues Tracker</h3>
      </div>
      <div class="flex gap-2">
        <label class="input">
          <i class="fa-solid fa-magnifying-glass text-slate-500"></i>
          <input type="search" class="grow" placeholder="Search issues..." />
        </label>
        <button type="button" class="btn btn-primary min-w-24 lg:min-w-32">
          <i class="fa-solid fa-plus"></i> New Issue
        </button>
      </div>
    </div>

    <div class="container mx-auto px-5 py-12 space-y-4">
        <div class="card w-full bg-base-100 shadow-sm">
            <div class="card-body space-y-4">
                <div class="card-actions">
                    <button id="all-issues-btn" onclick="setActiveTab('all-issues-btn')" class="tab-btn btn btn-primary min-w-24 lg:min-w-32">All</button>
                    <button id="open-issues-btn" onclick="setActiveTab('open-issues-btn')" class="tab-btn btn min-w-24 lg:min-w-32">Open</button>
                    <button id="closed-issues-btn" onclick="setActiveTab('closed-issues-btn')" class="tab-btn btn min-w-24 lg:min-w-32">Closed</button>
                </div>
            </div>
        </div>
        <div class="card w-full bg-base-100 shadow-sm bg-neutral-50 overflow-hidden">
            <div class="card-actions bg-white border-b border-slate-200 p-6 flex justify-between items-center flex-wrap gap-5">
                <div class="flex gap-2">
                    <img src="./assets/Aperture.png" alt="Aperture" class="size-12 bg-primary/20 p-2 rounded-full">
                    <div>
                        <h3 class="font-bold text-xl"><span id="issue-count">0</span> Issues</h3>
                        <p class="text-slate-500 text-sm">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="text-sm space-x-2">
                    <span><i class="fa-solid fa-circle text-success"></i> Open</span>
                    <span><i class="fa-solid fa-circle text-secondary"></i> Closed</span>
                </div>
            </div>

            <div class="card-body space-y-4">
                <!-- this is where I will put the data -->
                 <div id="issue-container">

                 </div>
            </div>
        </div>
    </div>

    
    <!-- TODO: Priority ( High ) siamparvez 030920261249 need to take this out before final push -->
    <div class="fixed bottom-1 right-1 z-50 flex size-6 items-center justify-center rounded-full bg-primary p-3 font-mono text-xs text-white">
        <div class="block md:hidden">sm</div>
        <div class="hidden md:block lg:hidden">md</div>
        <div class="hidden lg:block xl:hidden">lg</div>
        <div class="hidden xl:block 2xl:hidden">xl</div>
        <div class="hidden 2xl:block">2xl</div>
    </div>

    <script src="./scripts/main.js"></script>
  </body>
</html>
